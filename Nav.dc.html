<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Zilla+Slab:wght@500;600;700&display=swap" rel="stylesheet">
</helmet>
<div style="position:fixed; top:0; left:0; right:0; z-index:1000; font-family:'Manrope',sans-serif;">
  <div style="height:3px; width:100%; background:rgba(255,255,255,0.04);">
    <div style="height:100%; width:{{ progressPct }}; background:linear-gradient(90deg,#A45A20,#D38B36); transition:width 0.1s linear;"></div>
  </div>
  <nav style="display:flex; align-items:center; justify-content:space-between; padding:14px 5vw; background:{{ barBg }}; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-bottom:1px solid rgba(196,122,44,0.16); transition:background 0.3s ease;">
    <a href="Home.dc.html" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <img src="assets/twyicon.png" alt="Texas, Whiskey & You" style="height:42px; width:42px; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));">
      <span style="display:flex; flex-direction:column; line-height:1;">
        <span style="font-family:'Oswald',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.14em; color:#F4E9D8; white-space:nowrap;">TEXAS, WHISKEY &amp; YOU</span>
        <span style="font-family:'Oswald',sans-serif; font-weight:500; font-size:9px; letter-spacing:0.34em; color:#C47A2C; margin-top:3px;">A TRIBUTE TO CHRIS STAPLETON</span>
      </span>
    </a>
    <div style="display:flex; align-items:center; gap:26px;" data-desktop-nav>
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="6">
        <a href="{{ link.href }}" style="font-family:'Oswald',sans-serif; font-weight:500; font-size:13px; letter-spacing:0.16em; text-transform:uppercase; text-decoration:none; white-space:nowrap; color:{{ link.color }}; padding-bottom:3px; border-bottom:2px solid {{ link.underline }}; transition:color 0.2s ease;">{{ link.label }}</a>
      </sc-for>
      <a href="Book.dc.html" style="font-family:'Oswald',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; text-decoration:none; white-space:nowrap; color:#0D0D0D; background:linear-gradient(135deg,#D38B36,#A45A20); padding:11px 22px; border-radius:2px; box-shadow:0 4px 18px rgba(196,122,44,0.35);">Book The Band</a>
    </div>
    <button onClick="{{ toggleMenu }}" aria-label="Menu" style="display:none; flex-direction:column; align-items:center; justify-content:center; background:none; border:1px solid rgba(244,233,216,0.3); border-radius:2px; padding:9px 11px; cursor:pointer; color:#F4E9D8;" data-mobile-btn>
      <span style="display:block; width:22px; height:2px; background:#F4E9D8; margin:4px 0;"></span>
      <span style="display:block; width:22px; height:2px; background:#F4E9D8; margin:4px 0;"></span>
      <span style="display:block; width:22px; height:2px; background:#F4E9D8; margin:4px 0;"></span>
    </button>
  </nav>
  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <div style="background:#0D0D0D; border-bottom:1px solid rgba(196,122,44,0.2); padding:8px 5vw 22px;">
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="6">
        <a href="{{ link.href }}" style="display:block; font-family:'Oswald',sans-serif; font-weight:500; font-size:16px; letter-spacing:0.14em; text-transform:uppercase; text-decoration:none; color:{{ link.color }}; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.06);">{{ link.label }}</a>
      </sc-for>
      <a href="Book.dc.html" style="display:block; text-align:center; margin-top:18px; font-family:'Oswald',sans-serif; font-weight:600; font-size:15px; letter-spacing:0.14em; text-transform:uppercase; text-decoration:none; color:#0D0D0D; background:linear-gradient(135deg,#D38B36,#A45A20); padding:15px; border-radius:2px;">Book The Band</a>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:80},&quot;current&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { progress: 0, scrolled: false, menuOpen: false };

  componentDidMount() {
    this._onScroll = () => {
      const doc = document.documentElement;
      const max = doc.scrollHeight - doc.clientHeight;
      const p = max > 0 ? (doc.scrollTop || document.body.scrollTop) / max : 0;
      this.setState({ progress: Math.min(1, Math.max(0, p)), scrolled: (doc.scrollTop || document.body.scrollTop) > 30 });
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    this._onScroll();
    this._applyResponsive();
    this._onResize = () => this._applyResponsive();
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() {
    window.removeEventListener('scroll', this._onScroll);
    window.removeEventListener('resize', this._onResize);
  }
  _applyResponsive() {
    const mobile = window.innerWidth < 1120;
    const desk = document.querySelector('[data-desktop-nav]');
    const btn = document.querySelector('[data-mobile-btn]');
    if (desk) desk.style.display = mobile ? 'none' : 'flex';
    if (btn) btn.style.display = mobile ? 'flex' : 'none';
    if (!mobile && this.state.menuOpen) this.setState({ menuOpen: false });
  }

  renderVals() {
    const current = (this.props.current || 'home').toLowerCase();
    const defs = [
      { label: 'Home', href: 'Home.dc.html', key: 'home' },
      { label: 'Shows', href: 'Shows.dc.html', key: 'shows' },
      { label: 'Media', href: 'Media.dc.html', key: 'media' },
      { label: 'Book', href: 'Book.dc.html', key: 'book' },
      { label: 'The Band', href: 'Band.dc.html', key: 'band' },
      { label: 'Contact', href: 'Contact.dc.html', key: 'contact' }
    ];
    const links = defs.map(d => ({
      label: d.label,
      href: d.href,
      color: d.key === current ? '#D38B36' : '#F4E9D8',
      underline: d.key === current ? '#D38B36' : 'transparent'
    }));
    return {
      links,
      menuOpen: this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      progressPct: (this.state.progress * 100).toFixed(2) + '%',
      barBg: this.state.scrolled ? 'rgba(13,13,13,0.92)' : 'rgba(13,13,13,0.55)'
    };
  }
}
</script>
</body>
</html>
